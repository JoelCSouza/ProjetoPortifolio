<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--Cabeçalho-->
    <header>
        <div class="elemento">
            <p>Meu Portifólio</p>
        </div>

        <nav>
            <ul>
                <li><a href="index.html" class="menu-item">Sobre mim</a></li>
                <li><a href="formacao.html" class="menu-item ">Formação</a></li>
                <li><a href="portifolio.html" class="menu-item ">Portifólio</a></li>
                <li><a href="contato.html" class="menu-item active ">Contato</a></li>
            </ul>
        </nav>

        <div id="botaoTema">
            <button id="theme-toggle">Mudar Tema</button>
        </div>
    </header>

    <div class="conteiner-contato">
        <h1>Entre em contato</h1>

        <section class="formulario">
            <h2>Envie uma mensagem</h2>
            <form action="#">
                <label for="nome-usuario">Nome: </label> <br>
                <input type="text" id="nome-usuario" class="input-campo" placeholder="Seu nome" required> <br>
                <label for="emailusuario">Email: </label> <br>
                <input type="text" id="emailusuario" class="input-campo" placeholder="seu@email.com" required> <br>
                <label for="mensagem">Mensagem: </label> <br>
                <textarea name="" id="mensagem" class="input-campo"  placeholder="Digite sua mensagem aqui..." required style="height: 30vh;"></textarea> <br>
                <button type="submit" class="botao-enviar">Enviar</button>

            </form>
        </section>
    </div>

    
</body>
